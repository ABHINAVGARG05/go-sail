repositories:
  fiber: https://github.com/TejasGhatte/fiber-base-template.git
  echo: https://github.com/TejasGhatte/echo-basic-template.git
  gin: https://github.com/TejasGhatte/gin-basic-template.git

databases:
  postgres:
    name: postgres
    driverPkg: github.com/lib/pq
  mysql:
    name: mysql
    driverPkg: github.com/go-sql-driver/mysql
  sqlite:
    name: sqlite3
    driverPkg: github.com/mattn/go-sqlite3
  mongodb:
    name: mongodb
    driverPkg: go.mongodb.org/mongo-driver/mongo

orms:
  gorm:
    name: gorm
    importPath: gorm.io/gorm
  sqlx:
    name: sqlx
    importPath: github.com/jmoiron/sqlx
  mongo-driver:
    name: mongo-driver
    importPath: go.mongodb.org/mongo-driver/mongo

combinations:
  postgres:
    gorm:
      dsnTemplate: "host=localhost user=%s password=%s dbname=%s port=5432 sslmode=disable"
      initFunc: "gorm.Open(postgres.Open(dsn), &gorm.Config{})"
      additionalImports:
        - gorm.io/driver/postgres
    sqlx:
      dsnTemplate: "user=%s password=%s dbname=%s sslmode=disable"
      initFunc: "sqlx.Connect"
  mysql:
    gorm:
      dsnTemplate: "%s:%s@tcp(localhost:3306)/%s?parseTime=true"
      initFunc: "gorm.Open(mysql.Open, &gorm.Config{})(dsn)"
      additionalImports:
        - gorm.io/driver/mysql
    sqlx:
      dsnTemplate: "%s:%s@tcp(localhost:3306)/%s?parseTime=true"
      initFunc: "sqlx.Connect(\"mysql\", dsn)"
  sqlite:
    gorm:
      dsnTemplate: ""
      initFunc: ""
      additionalImports:
        - 
    sqlx:
      dsnTemplate: ""
      initFunc: ""
  mongodb:
    mongo-driver:
      dsnTemplate: "mongodb://%s:%s@localhost:27017/%s"
      initFunc: |
        var err error
        dsn := "mongodb://localhost:27017/your_database_name"
      
        ctx, cancel := context.WithTimeout(context.Background(), 10*time.Second)
        defer cancel()
      
        client, err := mongo.Connect(ctx, options.Client().ApplyURI(dsn))
        if err != nil {
          panic(fmt.Errorf("failed to connect to MongoDB: %w", err))
        }
      
        if err := client.Ping(ctx, nil); err != nil {
          panic(fmt.Errorf("failed to ping MongoDB: %w", err))
        }
      
        DB = client.Database("your_database_name")
        fmt.Println("Connected to MongoDB")
      additionalImports:
        - go.mongodb.org/mongo-driver/mongo
        - go.mongodb.org/mongo-driver/mongo/options

migrationCode:
  gorm: |
    err := DB.AutoMigrate(
    // Add your models here
    // &models.User{},
    // &models.Post{},
    )
    if err != nil {
      return fmt.Errorf("failed to run migrations: %w", err)
    }
  sqlx: |
      migrations := []string{
      // Add your migration SQL here
      // "CREATE TABLE IF NOT EXISTS users (id INTEGER PRIMARY KEY, name TEXT, email TEXT);",
      // "CREATE TABLE IF NOT EXISTS posts (id INTEGER PRIMARY KEY, title TEXT, content TEXT, userid INTEGER);",
      }
      fmt.Println("Running migrations")
      for _, migration := range migrations {
        _, err := DB.Exec(migration)
        if err != nil {
          fmt.Errorf("failed to run migrations: %w", err)
        }
      }
  mongo-driver: |
    fmt.Println("MongoDB typically does not require migrations, but you can ensure collections or indexes here.")

    ctx, cancel := context.WithTimeout(context.Background(), 5*time.Second)
    defer cancel()

    collection := DB.Collection("users")
    
    // Create an index on the email field for better performance
    indexModel := mongo.IndexModel{
        Keys:    map[string]interface{}{"email": 1},
        Options: options.Index().SetUnique(true),
    }
    
    _, err := collection.Indexes().CreateOne(ctx, indexModel)
    if err != nil {
        fmt.Printf("Warning: Failed to create index: %v\n", err)
    }
    
    // Insert initial document if collection is empty
    count, err := collection.CountDocuments(ctx, map[string]interface{}{})
    if err != nil {
        return fmt.Errorf("failed to count documents: %w", err)
    }
    
    if count == 0 {
        _, err := collection.InsertOne(ctx, map[string]interface{}{
            "init":       true,
            "created_at": time.Now(),
        })
        if err != nil {
            return fmt.Errorf("failed to insert initial document: %w", err)
        }
        fmt.Println("Initial document inserted successfully")
    }
    
    fmt.Println("MongoDB migration completed successfully")

  default: |
    fmt.Println("No specific migration logic for this ORM. Implement custom migration logic here.")